<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HammerLang — Origin Verification</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    .logo {
      font-size: 13px;
      color: #58a6ff;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 4px;
      color: #e6edf3;
    }

    .subtitle {
      font-size: 14px;
      color: #8b949e;
      margin-bottom: 40px;
    }

    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 32px;
      max-width: 560px;
      width: 100%;
      margin-bottom: 24px;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 18px;
      border-radius: 20px;
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 28px;
    }

    .status-certified {
      background: #1a4731;
      border: 1px solid #2ea043;
      color: #3fb950;
    }

    .status-unverified {
      background: #3d2f00;
      border: 1px solid #9e6a03;
      color: #d29922;
    }

    .status-tampered {
      background: #3d1111;
      border: 1px solid #da3633;
      color: #f85149;
    }

    .field {
      display: flex;
      flex-direction: column;
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid #21262d;
    }

    .field:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }

    .field-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #8b949e;
      margin-bottom: 4px;
    }

    .field-value {
      font-size: 14px;
      color: #e6edf3;
      font-family: 'Courier New', monospace;
      word-break: break-all;
    }

    .origin-human { color: #58a6ff; }
    .origin-ai { color: #bc8cff; }
    .origin-hybrid { color: #ffa657; }

    .qr-section {
      text-align: center;
      padding: 24px;
    }

    .qr-section p {
      font-size: 12px;
      color: #8b949e;
      margin-top: 12px;
    }

    #qrcode {
      display: inline-block;
      background: white;
      padding: 12px;
      border-radius: 8px;
    }

    .input-section {
      max-width: 560px;
      width: 100%;
      margin-bottom: 24px;
    }

    .input-section label {
      display: block;
      font-size: 13px;
      color: #8b949e;
      margin-bottom: 8px;
    }

    .input-row {
      display: flex;
      gap: 8px;
    }

    input[type="text"] {
      flex: 1;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 10px 14px;
      color: #e6edf3;
      font-size: 14px;
      font-family: monospace;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: #58a6ff;
    }

    button {
      background: #238636;
      border: 1px solid #2ea043;
      color: white;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
    }

    button:hover { background: #2ea043; }

    .upload-section {
      max-width: 560px;
      width: 100%;
      margin-bottom: 40px;
    }

    .upload-area {
      border: 2px dashed #30363d;
      border-radius: 8px;
      padding: 32px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .upload-area:hover { border-color: #58a6ff; }

    .upload-area p { color: #8b949e; font-size: 14px; }

    .footer {
      margin-top: 40px;
      text-align: center;
      font-size: 12px;
      color: #484f58;
    }

    .footer a { color: #58a6ff; text-decoration: none; }

    .hidden { display: none; }
  </style>
</head>
<body>

  <div class="logo">AICL:ORIGIN:v1.0</div>
  <h1>Content Origin Verification</h1>
  <p class="subtitle">Verify if any content was created by a Human, AI, or both</p>

  <!-- Upload .aicl.json -->
  <div class="upload-section">
    <div class="upload-area" onclick="document.getElementById('fileInput').click()">
      <p>📁 Drop a <strong>.aicl.json</strong> signature file here<br>or click to select</p>
      <input type="file" id="fileInput" accept=".json" style="display:none" onchange="loadSignatureFile(event)">
    </div>
  </div>

  <!-- Manual ID lookup -->
  <div class="input-section">
    <label>Or paste a Signature ID manually:</label>
    <div class="input-row">
      <input type="text" id="sigIdInput" placeholder="e.g. ba6582f0dc74186c">
      <button onclick="lookupById()">Verify</button>
    </div>
  </div>

  <!-- Result card -->
  <div class="card hidden" id="resultCard">
    <div id="statusBadge" class="status-badge"></div>
    <div id="fields"></div>
  </div>

  <!-- QR section -->
  <div class="card qr-section hidden" id="qrCard">
    <div id="qrcode"></div>
    <p>Scan this QR to share the verification link</p>
  </div>

  <div class="footer">
    <a href="https://github.com/ProtocoloAEE/HammerLang" target="_blank">github.com/ProtocoloAEE/HammerLang</a>
    &nbsp;·&nbsp; MIT License &nbsp;·&nbsp; Free for everyone
  </div>

  <script>
    function loadSignatureFile(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const sig = JSON.parse(e.target.result);
          displaySignature(sig, true);
        } catch {
          alert('Invalid signature file. Make sure it is a .aicl.json file generated by HammerLang.');
        }
      };
      reader.readAsText(file);
    }

    function lookupById() {
      const id = document.getElementById('sigIdInput').value.trim();
      if (!id) return;
      // In production this would fetch from an API
      // For now, show unverified with the ID
      displaySignature({
        signature_id: id,
        origin: 'UNKNOWN',
        tool: 'Unknown',
        timestamp: 'N/A',
        filename: 'N/A',
        content_hash: 'N/A',
        status: 'UNVERIFIED',
        verify_url: `https://protocoloaee.github.io/HammerLang/verify?id=${id}`,
        verification_message: 'Upload the .aicl.json file alongside the original file for full verification.'
      }, false);
    }

    function displaySignature(sig, showQR) {
      const card = document.getElementById('resultCard');
      const badge = document.getElementById('statusBadge');
      const fields = document.getElementById('fields');
      const qrCard = document.getElementById('qrCard');

      const status = sig.verification_result || sig.status || 'UNVERIFIED';

      const icons = { CERTIFIED: '✅', UNVERIFIED: '⚠️', TAMPERED: '🚨' };
      const classes = { CERTIFIED: 'status-certified', UNVERIFIED: 'status-unverified', TAMPERED: 'status-tampered' };

      badge.className = `status-badge ${classes[status] || 'status-unverified'}`;
      badge.innerHTML = `${icons[status] || '?'} ${status}`;

      const originColors = { HUMAN: 'origin-human', AI: 'origin-ai', HYBRID: 'origin-hybrid' };

      fields.innerHTML = `
        ${field('Origin', `<span class="${originColors[sig.origin] || ''}">${sig.origin}</span>`)}
        ${field('Tool', sig.tool)}
        ${field('Timestamp', sig.timestamp)}
        ${field('File', sig.filename)}
        ${field('Content Hash', sig.content_hash !== 'N/A' ? sig.content_hash.substring(0, 32) + '...' : 'N/A')}
        ${field('Signature ID', sig.signature_id)}
        ${sig.location ? field('Location', sig.location) : ''}
        ${sig.verification_message ? field('Message', sig.verification_message) : ''}
      `;

      card.classList.remove('hidden');

      if (showQR && sig.verify_url) {
        document.getElementById('qrcode').innerHTML = '';
        new QRCode(document.getElementById('qrcode'), {
          text: sig.verify_url,
          width: 180,
          height: 180,
          colorDark: '#000000',
          colorLight: '#ffffff',
        });
        qrCard.classList.remove('hidden');
      }

      card.scrollIntoView({ behavior: 'smooth' });
    }

    function field(label, value) {
      return `
        <div class="field">
          <span class="field-label">${label}</span>
          <span class="field-value">${value}</span>
        </div>
      `;
    }

    // Handle URL param ?id=
    const urlParams = new URLSearchParams(window.location.search);
    const idParam = urlParams.get('id');
    if (idParam) {
      document.getElementById('sigIdInput').value = idParam;
      lookupById();
    }
  </script>
</body>
</html>
